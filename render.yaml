services:
  - type: web
    name: brian-o-closet
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: SERVER_URL
        sync: false
      - key: DATABASE_PATH
        value: /var/data/store.db
      - key: AUDIT_LOG_PATH
        value: /var/data/audit.log
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: SESSION_TTL_MS
        value: 43200000
      - key: LOGIN_WINDOW_MS
        value: 900000
      - key: LOGIN_MAX_ATTEMPTS
        value: 5
      - key: ADMIN_WINDOW_MS
        value: 900000
      - key: ADMIN_MAX_REQUESTS
        value: 300
      - key: CHECKOUT_WINDOW_MS
        value: 600000
      - key: CHECKOUT_MAX_REQUESTS
        value: 30
      - key: RAZORPAY_ENABLED
        value: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: RAZORPAY_BASE_URL
        value: https://api.razorpay.com
    disk:
      name: brian-o-closet-data
      mountPath: /var/data
      sizeGB: 1
